name: SauceDemo Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  HEADLESS: "true"
  BROWSER: "chromium"
  PYTHON_VERSION: "3.13"

jobs:
  # ── Stage 1: Unit Tests ─────────────────────────────────────────────────────
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run unit tests
        run: |
          mkdir -p reports
          pytest tests/unit -m unit -v --html=reports/unit_report.html --self-contained-html

      - name: Upload unit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-report
          path: reports/unit_report.html
          retention-days: 7

  # ── Stage 2: Integration Tests ──────────────────────────────────────────────
  integration_tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit_tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run integration tests
        run: |
          mkdir -p reports
          pytest tests/integration -m integration -v --html=reports/integration_report.html --self-contained-html

      - name: Upload integration report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-report
          path: reports/integration_report.html
          retention-days: 7

  # ── Stage 3: E2E Tests ──────────────────────────────────────────────────────
  e2e_tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: integration_tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run e2e tests
        run: |
          mkdir -p reports
          pytest tests/e2e -m e2e -v --html=reports/e2e_report.html --self-contained-html

      - name: Upload e2e report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: reports/e2e_report.html
          retention-days: 7

  # ── Stage 4: Bundle all reports into one downloadable artifact ──────────────
  publish_report:
    name: Publish Reports
    runs-on: ubuntu-latest
    needs: [unit_tests, integration_tests, e2e_tests]
    if: always()
    steps:
      - name: Download unit report
        uses: actions/download-artifact@v4
        with:
          name: unit-report
          path: all-reports/

      - name: Download integration report
        uses: actions/download-artifact@v4
        with:
          name: integration-report
          path: all-reports/

      - name: Download e2e report
        uses: actions/download-artifact@v4
        with:
          name: e2e-report
          path: all-reports/

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: all-reports
          path: all-reports/
          retention-days: 14
