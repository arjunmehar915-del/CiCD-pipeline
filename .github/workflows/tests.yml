name: SauceDemo Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  HEADLESS: "true"
  BROWSER: "chromium"
  PYTHON_VERSION: "3.13"

jobs:
  # ── Stage 1: Unit Tests ─────────────────────────────────────────────────────
  unit_tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run unit tests
        run: |
          mkdir -p reports
          pytest tests/unit -m unit -v --html=reports/unit_report.html --self-contained-html

      - name: Upload unit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-report
          path: reports/unit_report.html
          retention-days: 7

  # ── Stage 2: Integration Tests ──────────────────────────────────────────────
  integration_tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit_tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run integration tests
        run: |
          mkdir -p reports
          pytest tests/integration -m integration -v --html=reports/integration_report.html --self-contained-html

      - name: Upload integration report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-report
          path: reports/integration_report.html
          retention-days: 7

  # ── Stage 3: E2E Tests ──────────────────────────────────────────────────────
  e2e_tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: integration_tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run e2e tests
        run: |
          mkdir -p reports
          pytest tests/e2e -m e2e -v --html=reports/e2e_report.html --self-contained-html

      - name: Upload e2e report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: reports/e2e_report.html
          retention-days: 7

  # ── Stage 4: Publish Reports to GitHub Pages ────────────────────────────────
  publish_report:
    name: Publish Reports
    runs-on: ubuntu-latest
    needs: [unit_tests, integration_tests, e2e_tests]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download unit report
        uses: actions/download-artifact@v4
        with:
          name: unit-report
          path: public/

      - name: Download integration report
        uses: actions/download-artifact@v4
        with:
          name: integration-report
          path: public/

      - name: Download e2e report
        uses: actions/download-artifact@v4
        with:
          name: e2e-report
          path: public/

      - name: Create index page
        run: |
          cat <<EOF > public/index.html
          <!DOCTYPE html>
          <html>
          <head><title>SauceDemo Test Reports</title></head>
          <body>
            <h1>SauceDemo Test Reports</h1>
            <ul>
              <li><a href="unit_report.html">Unit Tests</a></li>
              <li><a href="integration_report.html">Integration Tests</a></li>
              <li><a href="e2e_report.html">E2E Tests</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
